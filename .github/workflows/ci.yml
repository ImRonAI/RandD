name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  canonical-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install schema contract test dependencies
        run: python -m pip install pytest pytest-asyncio "strands-agents>=1.45.0,<2.0.0" pglast

      - name: Verify canonical Vantage schema contract and migration checksums
        working-directory: backend
        run: python -m pytest tests/test_dah_124_schema_reconciliation.py -q

      - name: Parse PostgreSQL migrations
        working-directory: backend
        run: |
          python - <<'PY'
          from pathlib import Path
          from pglast import parse_sql

          for migration in sorted(Path("migrations").glob("*.sql")):
              parse_sql(migration.read_text())
              print(f"parsed {migration.name}")
          PY

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install workspace packages (SDK is a local editable dep)
        run: |
          pip install -e harness-sdk/strands-py
          pip install -e "packages/shared[dev]"
          pip install -e "packages/db[dev]"
          pip install -e "apps/agent[dev]"
          pip install -e "apps/api[dev]"

      - name: Lint
        run: python -m ruff check packages apps/agent apps/api

      - name: Test
        run: python -m pytest packages/shared/tests packages/db/tests apps/agent/tests apps/api/tests -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
