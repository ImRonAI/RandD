      tags:
      - AddOns
      summary: Gets all the {HomeAway.DragomanAPI.Contract.Models.AddOn}s currently available for a single Property Management Company
      operationId: ListAddOns
      parameters:
      - name: x-homeaway-hasp-api-version
        in: header
        required: true
        schema:
          type: string
          default: '10'
      - name: x-homeaway-hasp-api-endsystem
        in: header
        required: true
        schema:
          type: string
          default: EscapiaVRS
      - name: x-homeaway-hasp-api-pmcid
        in: header
        required: true
        schema:
          type: string
          default: '1020'
      - name: Authorization
        in: header
        description: Bearer Authorization header. The value should be "Bearer < bearer token >". The bearer token is obtained from the auth/token endpoint. The bearer token must be base64 encoded. Use the above <a href='#oauthTokenGeneratorContainer'>form</a> to request and populate OAuth Bearer Token and Client Id.
        required: true
        schema:
          type: string
          default: Bearer <base64 encoded bearer token>
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: &id001
                type: array
                items:
                  $ref: '#/components/schemas/AddOn'
            text/json:
              schema: *id001
            application/xml:
              schema: *id001
            text/xml:
              schema: *id001
        '401':
          description: Unauthorized. This can result from a missing, expired or malformed Authorization header.
        '403':
          description: Forbidden. This can result from insufficient permissions to access a method.
