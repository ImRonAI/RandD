  /token:
    get:
      tags:
      - Gateway GraphQL API
      summary: Retrieve an OAuth bearer token
      description: 'Basic Authentication is used to retrieve a bearer token from the token service endpoint. The provided Client ID and Client Secret credentials are used to authenticate. The Authorization header must be a base64 encoded string of ''ClientId:ClientSecret''. The returned bearer token should be used as the authorization header on all subsequent GraphQL requests.


        Example: `curl -X GET https://api-gateway.escapia.com/token -H ''Authorization: Basic {AUTH_TOKEN}''` where {AUTH_TOKEN} is base64 of ''ClientId:ClientSecret''. Each bearer token has a maximum expiration date retrievable from the response header.'
      operationId: getToken
      security:
      - basicAuth: []
      responses:
        '200':
          description: Bearer token returned in the response body (e.g. 'Bearer <token>').
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Unauthorized. Invalid or missing credentials.
  /graphql:
    post:
      tags:
      - Gateway GraphQL API
      summary: Execute a GraphQL query against the Escapia Gateway API
      description: The Escapia Gateway API is a GraphQL API that allows Escapia partners to interact with the Escapia Vacation Rental Software (Property Management system) using JSON and the GraphQL query language. GraphQL gives clients the power to specify exactly what they need in a given request. The first endpoint available via the Gateway API is a Rates API for Escapia inventory. See the consolidated documentation for full GraphQL query examples, schema field reference, and the FAQ.
      operationId: executeGraphQL
      security:
      - bearerAuth: []
      requestBody:
        required: true
        description: A standard GraphQL POST request body containing 'query', optional 'variables', and optional 'operationName'. The endpoint follows the GraphQL over HTTP convention. Available top-level queries include propertyManager, pagedPropertyManagers, bookingChannels, and related rate/unit/availability fields. See consolidated documentation for the full query reference and examples.
        content:
          application/json:
            schema:
              type: object
              required:
              - query
              properties:
                query:
                  type: string
                  description: The GraphQL query string.
                variables:
                  type: object
                  description: Variables for the query.
                operationName:
                  type: string
                  description: Name of the operation to execute.
      responses:
        '200':
          description: GraphQL response (JSON). Contains 'data' and/or 'errors'.
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized. Missing, expired or malformed Authorization header.
        '429':
          description: Rate limited. See rate limiting section in documentation.
