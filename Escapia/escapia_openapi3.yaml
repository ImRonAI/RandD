openapi: 3.0.3
info:
  title: homeaway-hsapi-swagger-definition
  version: '10'
  description: '## Overview


    This OpenAPI specification consolidates the two Escapia developer APIs into a single document:


    1. **HSAPI (REST)** — the HomeAway Dragoman Adapter REST API at `https://hsapi.escapia.com/dragomanadapter` covering AddOns, Configuration, Events, Extras, FeatureGroups, Guests, Housekeeping, Marketing, NonAvailability, Owners, Packages, Payments, PromoCodes, Quotes, Reports, Reservations, Units, Utility, and WorkOrders (79 endpoints).


    2. **Gateway API (GraphQL)** — the Escapia Gateway GraphQL API at `https://api-gateway.escapia.com/graphql` for rates, fees, taxes, nightly rates, booking restrictions, booking channels, and unit listing content. Represented here as its two HTTP endpoints (/token, /graphql); see the consolidated documentation for the full GraphQL query reference.


    Authentication for HSAPI uses a bearer token from `/hsapi/auth/token` plus the `x-homeaway-hasp-api-version`, `x-homeaway-hasp-api-endsystem`, and `x-homeaway-hasp-api-pmcid` headers. Authentication for the Gateway API uses a bearer token from `/token`.'
servers:
- url: https://hsapi.escapia.com/dragomanadapter
  description: Escapia HSAPI (Dragoman Adapter)
- url: https://api-gateway.escapia.com
  description: Escapia Gateway API (GraphQL)
paths:
  /hsapi/ListAddOns:
