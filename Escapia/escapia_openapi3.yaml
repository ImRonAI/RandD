  /hsapi/GetReservationChanges:
    get:
      tags:
      - Reservations
      summary: Gets the reservations that have changed since the given version.
      description: "<para>When calling the method for the first time, a start version of 0 is suggested.  This will return changes since the end system has started tracking changes until the endVersion.</para>\r\n<para>Each method call returns both a change list and an endVersion, which represents the version of the last item included in the response. The change list will only include items with a version higher than the provided startVersion.</para>\r\n<para>For subsequent calls, use the endVersion from the previous response as the new startVersion to continue retrieving changes incrementally</para>\r\n<para>Note that the method does not guarantee returning all changes up to the current moment. It is the caller’s responsibility to make additional calls to ensure all changes are retrieved.</para>\r\n<para>Additionally, the method may collapse multiple changes to the same element into a single, most recent update. For example, if an element has undergone 50 modifications, only the latest\
        \ change will be included in the results.</para>"
      operationId: GetReservationChanges
      parameters:
      - name: x-homeaway-hasp-api-version
        in: header
        required: true
        schema:
          type: string
          default: '10'
      - name: x-homeaway-hasp-api-endsystem
        in: header
        required: true
        schema:
          type: string
          default: EscapiaVRS
      - name: x-homeaway-hasp-api-pmcid
        in: header
        required: true
        schema:
          type: string
          default: '1020'
      - name: startVersion
        in: query
        description: "The starting version for the search.  \r\n            \t<para>The initial call to this method should use a start version of 0.</para><para>Subsequent calls to the method should use the returned endVersion.</para>"
        required: true
        schema:
          type: integer
          format: int64
      - name: Authorization
        in: header
        description: Bearer Authorization header. The value should be "Bearer < bearer token >". The bearer token is obtained from the auth/token endpoint. The bearer token must be base64 encoded. Use the above <a href='#oauthTokenGeneratorContainer'>form</a> to request and populate OAuth Bearer Token and Client Id.
        required: true
        schema:
          type: string
          default: Bearer <base64 encoded bearer token>
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: &id084
                $ref: '#/components/schemas/ChangeList'
            text/json:
              schema: *id084
            application/xml:
              schema: *id084
            text/xml:
              schema: *id084
        '401':
          description: Unauthorized. This can result from a missing, expired or malformed Authorization header.
        '403':
          description: Forbidden. This can result from insufficient permissions to access a method.
