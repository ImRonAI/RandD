[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "strqc-db"
version = "0.1.0"
description = "STR QC platform — schema, migrations, repositories, seed data"
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.4",
]

[tool.hatch.build.targets.wheel]
packages = ["src/strqc_db"]

[tool.hatch.build.targets.wheel.force-include]
"src/strqc_db/migrations" = "strqc_db/migrations"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 110
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B"]
ignore = ["E501"]
